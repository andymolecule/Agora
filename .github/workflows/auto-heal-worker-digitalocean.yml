name: Auto-heal Worker (DigitalOcean)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: deploy-digitalocean-worker
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DO_WORKER_HOST: ${{ secrets.DO_WORKER_HOST }}
      DO_WORKER_USER: ${{ secrets.DO_WORKER_USER }}
      DO_WORKER_PORT: ${{ vars.DO_WORKER_PORT }}
      DO_WORKER_PATH: ${{ vars.DO_WORKER_PATH }}
      DO_WORKER_PM2_NAME: ${{ vars.DO_WORKER_PM2_NAME }}
      AGORA_API_HEALTH_URL: ${{ vars.AGORA_API_HEALTH_URL }}
    steps:
      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          test -n "$DO_WORKER_HOST"
          test -n "$DO_WORKER_USER"
          test -n "${{ secrets.DO_WORKER_SSH_KEY }}"

      - name: Configure SSH
        run: |
          set -euo pipefail
          DO_WORKER_PORT="${DO_WORKER_PORT:-22}"
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.DO_WORKER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DO_WORKER_PORT" -H "$DO_WORKER_HOST" >> ~/.ssh/known_hosts

      - name: Check runtime alignment and sealing readiness
        id: health
        run: |
          set -euo pipefail
          AGORA_API_HEALTH_URL="${AGORA_API_HEALTH_URL:-https://agoraapi-production-2708.up.railway.app/healthz}"
          AGORA_API_BASE_URL="${AGORA_API_HEALTH_URL%/healthz}"
          AGORA_WORKER_HEALTH_URL="$AGORA_API_BASE_URL/api/worker-health"

          api_json="$(curl -fsS "$AGORA_API_HEALTH_URL")"
          worker_json="$(curl -fsS "$AGORA_WORKER_HEALTH_URL")"

          API_JSON="$api_json" WORKER_JSON="$worker_json" node -e 'const api = JSON.parse(process.env.API_JSON ?? "{}"); const worker = JSON.parse(process.env.WORKER_JSON ?? "{}"); const apiRuntime = String(api.runtimeVersion ?? "").trim(); if (!apiRuntime) { console.error("Live API health did not include runtimeVersion."); process.exit(1); } const workers = worker.workers ?? {}; const sealing = worker.sealing ?? {}; const healthyActive = Number(workers.healthyWorkersForActiveRuntimeVersion ?? 0); const sealingConfigured = Boolean(sealing.configured); const sealingReady = Boolean(sealing.workerReady); const latestError = String(workers.latestError ?? "").trim(); const runningOverThreshold = Number(worker.runningOverThresholdCount ?? 0); const reasons = []; if (healthyActive <= 0) reasons.push("zero healthy workers on the active API runtime"); if (sealingConfigured && !sealingReady) reasons.push("sealed-submission worker readiness is false"); console.log(`api_runtime=${apiRuntime}`); console.log(`running_over_threshold=${runningOverThreshold}`); if (reasons.length > 0) { console.log("needs_heal=true"); console.log(`reasons=${reasons.join(" ; ")}`); if (latestError) console.log(`latest_error=${latestError}`); } else { console.log("needs_heal=false"); }' >> "$GITHUB_OUTPUT"

      - name: Report health status
        run: |
          set -euo pipefail
          echo "API runtime: ${{ steps.health.outputs.api_runtime }}"
          if [ "${{ steps.health.outputs.needs_heal }}" = "true" ]; then
            echo "Auto-heal required: ${{ steps.health.outputs.reasons }}"
            if [ -n "${{ steps.health.outputs.latest_error }}" ]; then
              echo "Latest worker error: ${{ steps.health.outputs.latest_error }}"
            fi
          else
            echo "Worker runtime is healthy; no action required."
          fi

      - name: Redeploy worker on droplet
        if: steps.health.outputs.needs_heal == 'true'
        run: |
          set -euo pipefail
          DO_WORKER_PORT="${DO_WORKER_PORT:-22}"
          DO_WORKER_PATH="${DO_WORKER_PATH:-/opt/agora}"
          DO_WORKER_PM2_NAME="${DO_WORKER_PM2_NAME:-agora-worker}"
          ssh -p "$DO_WORKER_PORT" "$DO_WORKER_USER@$DO_WORKER_HOST" \
            "set -euo pipefail; cd '$DO_WORKER_PATH'; if [ ! -x scripts/ops/deploy-worker.sh ]; then git fetch origin main && git checkout main && git pull --ff-only origin main; fi; export AGORA_DEPLOY_EXPECTED_SHA='${{ steps.health.outputs.api_runtime }}' AGORA_WORKER_PM2_NAME='$DO_WORKER_PM2_NAME'; bash scripts/ops/deploy-worker.sh"

      - name: Wait for worker recovery
        if: steps.health.outputs.needs_heal == 'true'
        run: |
          set -euo pipefail
          AGORA_API_HEALTH_URL="${AGORA_API_HEALTH_URL:-https://agoraapi-production-2708.up.railway.app/healthz}"
          AGORA_API_BASE_URL="${AGORA_API_HEALTH_URL%/healthz}"
          AGORA_WORKER_HEALTH_URL="$AGORA_API_BASE_URL/api/worker-health"
          EXPECTED_RUNTIME_VERSION="${{ steps.health.outputs.api_runtime }}"

          for attempt in $(seq 1 20); do
            worker_json="$(curl -fsS "$AGORA_WORKER_HEALTH_URL")"

            HEALTHY="$(
              EXPECTED_RUNTIME_VERSION="$EXPECTED_RUNTIME_VERSION" WORKER_JSON="$worker_json" node -e 'const worker = JSON.parse(process.env.WORKER_JSON ?? "{}"); const workers = worker.workers ?? {}; const sealing = worker.sealing ?? {}; const expected = String(process.env.EXPECTED_RUNTIME_VERSION ?? ""); const activeRuntime = String(workers.activeRuntimeVersion ?? ""); const healthyActive = Number(workers.healthyWorkersForActiveRuntimeVersion ?? 0); const sealingConfigured = Boolean(sealing.configured); const sealingReady = Boolean(sealing.workerReady); const healthy = activeRuntime === expected && healthyActive > 0 && (!sealingConfigured || sealingReady); process.stdout.write(healthy ? "true" : "false");'
            )"

            if [ "$HEALTHY" = "true" ]; then
              echo "Worker recovered and is aligned with the live API runtime."
              exit 0
            fi

            echo "Worker still unhealthy after auto-heal attempt ($attempt/20). Waiting 15s..."
            sleep 15
          done

          echo "Worker did not recover after auto-heal."
          exit 1

      - name: Recover stale score jobs after heal
        if: steps.health.outputs.needs_heal == 'true' && steps.health.outputs.running_over_threshold != '0'
        run: |
          set -euo pipefail
          DO_WORKER_PORT="${DO_WORKER_PORT:-22}"
          DO_WORKER_PATH="${DO_WORKER_PATH:-/opt/agora}"
          ssh -p "$DO_WORKER_PORT" "$DO_WORKER_USER@$DO_WORKER_HOST" \
            "set -euo pipefail; cd '$DO_WORKER_PATH'; pnpm recover:score-jobs -- --stale-minutes=20"
