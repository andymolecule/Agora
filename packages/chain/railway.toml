[build]
builder = "RAILPACK"
buildCommand = "pnpm turbo build --filter=@agora/chain"
watchPatterns = [
  "/packages/chain/**",
  "/packages/common/**",
  "/packages/db/**",
  "/packages/ipfs/**",
  "/scripts/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/turbo.json",
  "/tsconfig.base.json",
]

[deploy]
startCommand = "pnpm --filter @agora/chain indexer"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
